linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - nilerr

linters-settings:
  goimports:
    local-prefixes: github.com/bachtiarpanjaitan/ihandai-go
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unused
    - linters:
        - staticcheck
      text: "SA1019"
    - linters:
        - staticcheck
      text: "SA4006"
